name: LLM Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  run:
    runs-on: self-hosted

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Start Ollama
      run: ollama serve &

    - name: Wait for Ollama to be ready
      run: sleep 5

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run evaluation
      run: python evavulation_runner.py

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: results
        path: results/results.csv
