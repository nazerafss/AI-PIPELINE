name: LLM Pipeline

on:
  push:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run evaluation
      run: python evavulation_runner.py

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: results
        path: results/results.csv
